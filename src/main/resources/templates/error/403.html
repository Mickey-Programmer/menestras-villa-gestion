<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Acceso Denegado | Sistema GIAR-V</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.5/font/bootstrap-icons.css">
</head>
<body class="bg-light d-flex align-items-center justify-content-center" style="height: 100vh;">
    <div class="text-center shadow bg-white p-5 rounded-4 border-top border-danger border-5">
        <i class="bi bi-shield-lock-fill text-danger" style="font-size: 6rem;"></i>
        <h2 class="fw-bold mt-3 text-dark">Acceso Restringido</h2>
        <p class="text-muted fs-6 mb-4">Tu cuenta actual no tiene privilegios para acceder a este módulo de Menestras Villa.</p>
        
        <form th:action="@{/logout}" method="post">
            <button type="submit" class="btn btn-danger px-4 py-2 rounded-pill fw-bold shadow-sm">
                <i class="bi bi-box-arrow-right me-2"></i>Cerrar Sesión y Volver
            </button>
        </form>
        
        <a th:href="@{/dashboard}" class="btn btn-outline-secondary mt-3 px-4 py-2 rounded-pill fw-bold btn-sm">
            <i class="bi bi-arrow-left me-1"></i> Ir al Dashboard
        </a>
    </div>
</body>
</html>
