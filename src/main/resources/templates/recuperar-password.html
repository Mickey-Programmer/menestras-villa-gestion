<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Nueva Contraseña | Sistema GIAR-V</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.5/font/bootstrap-icons.css">
    <style>
        body { background-color: #f0f2f5; height: 100vh; display: flex; align-items: center; justify-content: center; }
        .card-auth { max-width: 400px; width: 100%; border: none; border-radius: 20px; box-shadow: 0 10px 25px rgba(0,0,0,0.1); }
    </style>
</head>
<body>
    <div class="card card-auth p-4 p-md-5 bg-white">
        <div class="text-center mb-4">
            <i class="bi bi-shield-lock fs-1 text-success"></i>
            <h4 class="fw-bold mt-2">Nueva Contraseña</h4>
            <p class="text-muted small">Ingresa tu nueva clave de acceso seguro.</p>
        </div>
        <form th:action="@{/recuperar-password}" method="post">
            <input type="hidden" name="token" th:value="${token}">
            <div class="mb-4">
                <label class="form-label small fw-bold text-muted text-uppercase">Contraseña Nueva</label>
                <input type="password" name="password" class="form-control form-control-lg bg-light" placeholder="******" required minlength="6">
            </div>
            <button type="submit" class="btn btn-success w-100 fw-bold py-3 shadow-sm">Guardar y Entrar</button>
        </form>
    </div>
</body>
</html>
