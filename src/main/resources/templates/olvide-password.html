<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Recuperar Contraseña | Sistema GIAR-V</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.5/font/bootstrap-icons.css">
    <style>
        body { background-color: #f0f2f5; height: 100vh; display: flex; align-items: center; justify-content: center; }
        .card-auth { max-width: 400px; width: 100%; border: none; border-radius: 20px; box-shadow: 0 10px 25px rgba(0,0,0,0.1); }
    </style>
</head>
<body>
    <div class="card card-auth p-4 p-md-5 bg-white">
        <div class="text-center mb-4">
            <i class="bi bi-envelope-paper-heart fs-1 text-primary"></i>
            <h4 class="fw-bold mt-2">Recuperar Acceso</h4>
            <p class="text-muted small">Ingresa tu correo y te enviaremos un enlace para crear una nueva contraseña.</p>
        </div>
        <form th:action="@{/olvide-password}" method="post">
            <div class="mb-4">
                <label class="form-label small fw-bold text-muted text-uppercase">Correo Electrónico</label>
                <input type="email" name="email" class="form-control form-control-lg bg-light" placeholder="usuario@correo.com" required>
            </div>
            <button type="submit" class="btn btn-primary w-100 fw-bold py-3 shadow-sm mb-3">Enviar Enlace</button>
            <div class="text-center">
                <a th:href="@{/login}" class="text-decoration-none small text-muted"><i class="bi bi-arrow-left me-1"></i>Volver al inicio de sesión</a>
            </div>
        </form>
    </div>
</body>
</html>
